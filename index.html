<div class="tab-container">
    <button class="tab-btn active" data-target="upload-tab">Upload & Configure</button>
    <button class="tab-btn" data-target="preview-tab">Preview & Generate</button>
    <button class="tab-btn" data-target="results-tab">Results</button>
</div>

<div id="upload-tab" class="tab-content active">
    <h2>Step 1: Upload Your Images</h2>
    <input type="file" id="main-image-upload" accept="image/*">
    </div>

<div id="preview-tab" class="tab-content hidden">
    <h2>Step 2: Preview Your Mosaic</h2>
    <canvas id="preview-canvas" width="600" height="400" style="border: 1px solid #ccc;"></canvas>
    <br>
    <button id="generate-btn">Generate Mosaic</button>
</div>

<div id="results-tab" class="tab-content hidden">
    <h2>Step 3: Download Your Result</h2>
    <div id="result-container"></div>
</div>
